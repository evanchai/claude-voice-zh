<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-voice-zh Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background glow */
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.15;
  }
  .bg-glow.blue {
    top: -200px;
    right: -100px;
    background: #5e9cff;
  }
  .bg-glow.purple {
    bottom: -200px;
    left: -100px;
    background: #a573ff;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }

  /* Top badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(94, 156, 255, 0.1);
    border: 1px solid rgba(94, 156, 255, 0.25);
    border-radius: 20px;
    padding: 8px 20px;
    margin-bottom: 36px;
  }
  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5e9cff;
    box-shadow: 0 0 12px rgba(94, 156, 255, 0.6);
  }
  .badge-text {
    color: #5e9cff;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* Main title */
  .title {
    text-align: center;
    margin-bottom: 32px;
  }
  .title-top {
    font-size: 40px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 2px;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .title-highlight {
    background: linear-gradient(135deg, #5e9cff, #a573ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title-sub {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.1;
    background: linear-gradient(135deg, #5e9cff, #a573ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: italic;
  }
  .title-zh {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 12px;
    letter-spacing: 4px;
  }

  /* Capsule mockup */
  .capsule {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 23px;
    height: 46px;
    padding: 0 24px 0 18px;
    margin-bottom: 40px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .capsule-indicator {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #5e9cff;
    box-shadow: 0 0 16px rgba(94, 156, 255, 0.5);
  }
  .capsule-text {
    color: rgba(255, 255, 255, 0.85);
    font-size: 15px;
    font-weight: 400;
  }

  /* F5 key + description */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .f5-key {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 52px;
    background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    box-shadow: 0 2px 0 #000, 0 4px 8px rgba(0, 0, 0, 0.3);
  }
  .f5-key span {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    font-family: "SF Mono", "Menlo", monospace;
  }
  .bottom-desc {
    color: rgba(255, 255, 255, 0.45);
    font-size: 18px;
    font-weight: 400;
  }

  /* Waveform decoration */
  .waveform {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 3px;
    opacity: 0.08;
  }
  .waveform .bar {
    width: 3px;
    background: #5e9cff;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="bg-glow blue"></div>
<div class="bg-glow purple"></div>

<!-- Waveform background decoration -->
<div class="waveform" id="waveform"></div>

<div class="container">
  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">macOS native</span>
  </div>

  <div class="title">
    <div class="title-top">Claude Code 版</div>
    <div class="title-sub">Typeless</div>
    <div class="title-zh">中文语音输入</div>
  </div>

  <div class="capsule">
    <div class="capsule-indicator"></div>
    <span class="capsule-text">帮我把这个接口的错误处理完善一下...</span>
  </div>

  <div class="bottom-row">
    <div class="f5-key"><span>F5</span></div>
    <span class="bottom-desc">按一下说，再按一下粘贴</span>
  </div>
</div>

<script>
  // Generate waveform bars
  const waveform = document.getElementById('waveform');
  const barCount = 80;
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const distance = Math.abs(i - barCount / 2) / (barCount / 2);
    const height = Math.max(8, (1 - distance * distance) * 60 * (0.3 + Math.random() * 0.7));
    bar.style.height = height + 'px';
    waveform.appendChild(bar);
  }
</script>

</body>
</html>
